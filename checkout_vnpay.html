<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thanh toán VNPay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="card mx-auto" style="max-width:640px">
    <div class="card-header bg-primary text-white"><i class="fa fa-credit-card me-2"></i>VNPay - Thanh toán an toàn</div>
    <div class="card-body">
      <div id="sum" class="h5 mb-3">Đang tính...</div>
      <button id="pay" class="btn btn-primary w-100"><i class="fa fa-check me-1"></i>Xác nhận thanh toán</button>
      <div id="msg" class="small text-muted mt-3"></div>
      <div class="text-end mt-3"><a href="cart.html" class="text-decoration-none">← Quay lại giỏ hàng</a></div>
    </div>
  </div>
</div>

<script type="module">
import { supabase, VND, requireBuyer, txCode } from './buyer.js';
const u=requireBuyer(); if(!u) throw new Error('no user');

let items=[], sub=0, ordersCreated=[];
const API_BASE = '';

async function load(){
  const r=await supabase.from('cart_items').select('*').eq('user_id', u.user_id);
  items=r.data||[];
  sub = items.reduce((s,x)=>s+Number(x.price)*Number(x.quantity),0);
  document.getElementById('sum').textContent='Tổng thanh toán: '+VND(sub);
}

document.getElementById('pay').onclick = async ()=>{
  if(!items.length) return document.getElementById('msg').textContent='Giỏ hàng trống.';
  
  document.getElementById('pay').disabled=true; 
  document.getElementById('msg').textContent='Đang tạo đơn hàng...';
  
  try {
    // Group by store
    const byStore = items.reduce((m,x)=>{ (m[x.store_id]=m[x.store_id]||[]).push(x); return m; }, {});
    
    for(const [store_id, arr] of Object.entries(byStore)){
      const total = arr.reduce((s,x)=>s+Number(x.price)*Number(x.quantity),0);
      
      // Create order in DB
      const ins = await supabase.from('orders').insert([{ 
        store_id:Number(store_id), 
        buyer_id:u.user_id, 
        total_price: total, 
        payment_method: 'VNPay',
        order_status:'pending', 
        created_at: new Date().toISOString() 
      }]).select('order_id').single();
      
      if(ins.error) throw new Error('Lỗi tạo đơn: '+ins.error.message);
      const order_id=ins.data.order_id;
      
      // Create order items
      const rows = arr.map(x=>({
        order_id, 
        product_id:x.product_id, 
        product_name:x.product_name||'', 
        quantity:x.quantity,
        price_each: x.price
      }));
      
      const itemsRes = await supabase.from('order_details').insert(rows);
      if(itemsRes.error) throw new Error('Lỗi chi tiết đơn: '+itemsRes.error.message);
      
      ordersCreated.push({ order_id, total });
    }
    
    // Clear cart first
    await supabase.from('cart_items').delete().eq('user_id', u.user_id);
    
    document.getElementById('msg').textContent='Đang chuyển hướng đến VNPay...';
    
    // Call backend to create payment & get VNPay URL
    if(ordersCreated.length > 0) {
      const firstOrder = ordersCreated[0];
      console.log('Sending payment request:', {
        amount: firstOrder.total,
        orderId: firstOrder.order_id,
        userId: u.user_id
      });
      
      const response = await fetch(API_BASE + '/api/create-qr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: firstOrder.total,
          orderId: firstOrder.order_id,
          userId: u.user_id,
          orderInfo: `Order #${firstOrder.order_id}`
        })
      });
      
      console.log('Response status:', response.status);
      
      if(!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error || 'Lỗi tạo link thanh toán');
      }
      
      const data = await response.json();
      console.log('VNPay response:', data);
      console.log('Response keys:', Object.keys(data));

      // Redirect to VNPay payment URL - handle all possible key names
      const paymentUrl = data.paymentUrl || data.checkoutUrl || data.url || Object.values(data).find(v => typeof v === 'string' && v.includes('vnpayment'));
      
      if(paymentUrl) {
        // Lưu orderId để check sau
        sessionStorage.setItem('lastOrderId', firstOrder.order_id);
        window.location.href = paymentUrl;
      } else {
        throw new Error('Không nhận được URL thanh toán từ VNPay. Response: ' + JSON.stringify(data));
      }
    }
    
  } catch(error) {
    document.getElementById('msg').textContent='Lỗi: '+error.message;
    document.getElementById('pay').disabled=false;
    console.error('Checkout error:', error);
  }
};

await load();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
