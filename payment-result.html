<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kết quả thanh toán</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .result-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .result-card {
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      padding: 40px;
      max-width: 500px;
      background: white;
    }
    .success-icon {
      color: #10b981;
      font-size: 4rem;
      margin-bottom: 20px;
    }
    .error-icon {
      color: #ef4444;
      font-size: 4rem;
      margin-bottom: 20px;
    }
    .result-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 15px;
    }
    .result-message {
      font-size: 1rem;
      color: #666;
      margin-bottom: 30px;
    }
    .order-id {
      background: #f3f4f6;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 1.1rem;
    }
    .btn-action {
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<div class="result-container">
  <div class="result-card">
    <div id="resultIcon"></div>
    <h1 class="result-title" id="resultTitle"></h1>
    <p class="result-message" id="resultMessage"></p>
    <div id="orderIdContainer"></div>
    
    <div>
      <a href="orders.html" class="btn btn-primary btn-action me-2">
        <i class="fa fa-list me-2"></i>Xem đơn hàng
      </a>
      <a href="index.html" class="btn btn-secondary btn-action">
        <i class="fa fa-home me-2"></i>Về trang chủ
      </a>
    </div>
  </div>
</div>

<script>
  // Parse URL params
  const params = new URLSearchParams(window.location.search);
  let status = params.get('status');
  let orderId = params.get('orderId') || sessionStorage.getItem('lastOrderId');
  const message = params.get('message');

  const resultIcon = document.getElementById('resultIcon');
  const resultTitle = document.getElementById('resultTitle');
  const resultMessage = document.getElementById('resultMessage');
  const orderIdContainer = document.getElementById('orderIdContainer');

  // Function để poll trạng thái payment
  async function checkPaymentStatus() {
    if (!orderId) return;
    
    try {
      const response = await fetch(`/api/check-payment-status/${orderId}`);
      const data = await response.json();
      
      console.log('Payment status:', data);
      
      // Nếu payment completed, update UI và redirect
      if (data.status === 'completed') {
        status = 'success';
        renderResult();
        clearInterval(pollInterval);
        
        // Chuyển hướng sau 3 giây
        setTimeout(() => {
          location.href = 'orders.html';
        }, 3000);
      }
    } catch (error) {
      console.error('Error checking payment:', error);
    }
  }

    // Gửi params VNPay (window.location.search) đến backend để verify và cập nhật DB
    async function postVerifyReturn(paramsObj) {
      try {
        const resp = await fetch('/api/verify-return', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(paramsObj)
        });

        const result = await resp.json();
        console.log('Verify return result:', result);

        if (resp.ok && result.success) {
          status = 'success';
          renderResult();
          setTimeout(() => { location.href = 'orders.html'; }, 2000);
          return true;
        }

        return false;
      } catch (err) {
        console.error('Error posting verify-return:', err);
        return false;
      }
    }

    // Mark payment as completed khi user quay về từ VNPay
    async function markPaymentCompleted() {
      if (!orderId) return;
    
      try {
        const response = await fetch(`/api/mark-payment-completed/${orderId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await response.json();
      
        console.log('Mark payment response:', data);
      
        if (data.success) {
          status = 'success';
          renderResult();
        
          // Chuyển hướng sau 3 giây
          setTimeout(() => {
            location.href = 'orders.html';
          }, 3000);
        }
      } catch (error) {
        console.error('Error marking payment:', error);
      }
    }

  function renderResult() {
    if (status === 'success') {
      resultIcon.innerHTML = '<i class="fa fa-check-circle success-icon"></i>';
      resultTitle.textContent = 'Thanh toán thành công!';
      resultMessage.textContent = 'Đơn hàng của bạn đã được xác nhận và sẽ được xử lý sớm.';
      if (orderId) {
        orderIdContainer.innerHTML = `<div class="order-id">Mã đơn hàng: <strong>#${orderId}</strong></div>`;
      }
    } else {
      resultIcon.innerHTML = '<i class="fa fa-times-circle error-icon"></i>';
      resultTitle.textContent = 'Thanh toán thất bại!';
      resultMessage.textContent = message || 'Có lỗi xảy ra trong quá trình thanh toán. Vui lòng thử lại.';
    }
  }


  // Nếu status là success nhưng payment vẫn pending, poll mỗi 2 giây
  let pollInterval;
  if (status === 'success' && orderId) {
    checkPaymentStatus();
    pollInterval = setInterval(checkPaymentStatus, 2000);
  } else {
    // Nếu fail, tự động redirect sau 5 giây
    setTimeout(() => {
      location.href = 'cart.html';
    }, 5000);
  }
  renderResult();

    // Nếu có params từ VNPay (vnp_TxnRef), gửi chúng về server để verify và cập nhật DB.
    (async () => {
      const qp = new URLSearchParams(window.location.search);
      const paramsObj = {};
      for (const [k, v] of qp.entries()) paramsObj[k] = v;

      // Nếu có transaction reference, try verify-return first
      if (paramsObj.vnp_TxnRef) {
        const ok = await postVerifyReturn(paramsObj);
        if (!ok) {
          // Fallback for local dev when callback is not available
          console.warn('Verify-return failed, attempting dev mark endpoint');
          await markPaymentCompleted();
        }
        return;
      }

      // Nếu không có params từ VNPay nhưng vẫn có orderId trong session, poll trạng thái
      if (orderId) {
        checkPaymentStatus();
        pollInterval = setInterval(checkPaymentStatus, 2000);
      }
    })();

  // Nếu status là success, mark payment as completed ngay
  if (status === 'success' && orderId) {
    markPaymentCompleted();
    
    // Chuyển hướng sau 3 giây
    setTimeout(() => {
      location.href = 'orders.html';
    }, 3000);
  } else {
    // Nếu fail, tự động redirect sau 5 giây
    setTimeout(() => {
      location.href = 'cart.html';
    }, 5000);
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
