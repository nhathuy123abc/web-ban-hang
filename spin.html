  <style>
    body {
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      font-family: "Inter", sans-serif;
      padding-bottom: 40px;
    }

    h3 {
      font-weight: 800;
      color: #1e293b;
    }

    /* Vùng bao toàn bộ pointer + bánh xe */
    .wheel-zone {
      position: relative;
      width: 380px;
      margin: auto;
      z-index: 1;
      overflow: visible;
      max-width: 100%;
    }

    /* Pointer cố định, KHÔNG xoay */
    #pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    #pointer svg {
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.25));
      animation: pointerPulse 2s infinite ease-in-out;
    }

    @keyframes pointerPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    /* Vòng quay */
    #wheelWrap {
      width: 360px;
      height: 360px;
      margin: auto;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffffff, #f3f4f6);
      box-shadow:
        0 10px 25px rgba(0,0,0,0.15),
        0 0 0 10px #fde68a inset,
        0 0 0 20px #fbbf24 inset;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheelCanvas {
      width: 100%;
      height: auto;
      border-radius: 50%;
      box-shadow:
        0 6px 12px rgba(0,0,0,0.18),
        inset 0 0 25px rgba(255,255,255,0.65);
    }

    /* Nút quay */
    #btnSpin {
      background: linear-gradient(145deg, #f97316, #ea580c);
      border: none;
      padding: 14px 38px;
      font-size: 22px;
      font-weight: 700;
      border-radius: 50px;
      color: white;
      box-shadow: 0 8px 18px rgba(234,88,12,0.4);
      transition: 0.25s;
    }

    #btnSpin:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 25px rgba(234,88,12,0.5);
    }

    #btnSpin:active {
      transform: scale(0.97);
    }

    #btnSpin:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Hiệu ứng sáng */
    .spinning_glow {
      animation: glowPulse 1.2s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 25px rgba(251,191,36,0.45); }
      50% { box-shadow: 0 0 55px rgba(251,191,36,0.9); }
      100% { box-shadow: 0 0 25px rgba(251,191,36,0.45); }
    }

    /* Rung khi trúng */
    .shake {
      animation: shakeAnim 0.4s ease-in-out;
    }

    @keyframes shakeAnim {
      0% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    .navbar {
      background-color: #1e293b;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .navbar .navbar-brand {
      color: #38bdf8;
      font-weight: 600;
    }

    .navbar .navbar-brand:hover {
      color: #0ea5e9;
    }

    .navbar .nav-link {
      color: #e2e8f0;
      font-weight: 500;
      transition: color 0.2s;
    }

    .navbar .nav-link:hover {
      color: #38bdf8;
    }

    .navbar .nav-link.active {
      color: #38bdf8;
      font-weight: 600;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>

  <div class="container py-4 text-center">
    <h3>🎡 Vòng Quay May Mắn</h3>
    <p class="text-muted">Quay là có quà – voucher hấp dẫn dành cho bạn!</p>

    <!-- Pointer + Wheel -->
    <div class="wheel-zone">
      <div id="pointer">
        <svg width="45" height="45" viewBox="0 0 24 24">
          <path fill="#dc2626" d="M12 2 7 12h10L12 2z"/>
        </svg>
      </div>

      <div id="wheelWrap">
        <canvas id="wheelCanvas" width="360" height="360"></canvas>
      </div>
    </div>

    <button class="btn mt-3" id="btnSpin">QUAY</button>
    <div id="resultArea" class="mt-4"></div>

    <div class="segment-list card p-3 mt-4 shadow-sm">
      <h6 class="fw-bold text-start">Danh sách phần thưởng</h6>
      <ul id="segments" class="list-group list-group-flush"></ul>
    </div>

  <!-- KHÔNG SỬA BACKEND -->
  <script src="buyer.js"></script>

  <script>
    /* ------ Toàn bộ JS logic của bạn giữ nguyên ------ */
    (async function(){
      if(!window.me) return location.href='login.html';

      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const btn = document.getElementById('btnSpin');
      const segListEl = document.getElementById('segments');
      const resultArea = document.getElementById('resultArea');
      const wrap = document.getElementById('wheelWrap');

      function renderSegmentsList(segs){
        segListEl.innerHTML = segs.map(
          s => `<li class="list-group-item d-flex justify-content-between align-items-center">${s.label}<span class="badge bg-light text-dark">${s.discount_percent}%</span></li>`
        ).join('') || '<li class="list-group-item text-muted">Chưa có phần thưởng</li>';
      }

      async function loadSegments(){
        const r = await sb.from('wheel_segments').select('*').order('segment_id');
        const segs = (r.data || []).filter(s=>s.active);
        renderSegmentsList(segs);
        return segs;
      }

      function resizeCanvas(){
        // Use the non-rotated container size (wheel-zone) so transforms don't inflate the bounding box
        const container = wrap.parentElement || wrap;
        // clientWidth/clientHeight are layout sizes not affected by CSS transforms
        const size = Math.min(container.clientWidth || 360, container.clientHeight || 360) || 360;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(size * dpr);
        canvas.height = Math.round(size * dpr);
        canvas.style.width = size + "px";
        canvas.style.height = size + "px";
        // set transform so drawing units are in CSS pixels
        ctx.setTransform(dpr,0,0,dpr,0,0);
        return size;
      }

      function drawWheel(segs, highlightIndex){
        const size = resizeCanvas();
        const cx = size/2;
        const cy = size/2;
        const radius = cx - 10;
        const n = segs.length;
        if(n === 0){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
        const angle = (2 * Math.PI) / n;
        const colors = ['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6'];

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save();
        ctx.translate(cx,cy);

        for(let i=0;i<n;i++){
          ctx.beginPath();
          ctx.moveTo(0,0);
          ctx.arc(0,0,radius, i*angle, (i+1)*angle);
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();

          const mid = i*angle + angle/2;
          ctx.save();
          ctx.rotate(mid);
          const fontSize = Math.max(11, Math.round(radius * 0.08));
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const tx = radius * 0.64;
          ctx.translate(tx, 0);
          if(mid > Math.PI/2 && mid < 3*Math.PI/2){ ctx.rotate(Math.PI); }
          ctx.fillStyle = '#fff';
          const text = String(segs[i].label || '-');
          const maxWidth = radius * 0.7;
          const words = text.split(' ');
          let line = '', lines = [];
          for(const w of words){
            const test = line ? (line + ' ' + w) : w;
            if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; } else { line = test; }
          }
          if(line) lines.push(line);
          const lh = fontSize + 2;
          const startY = - (lines.length - 1) * (lh/2);
          for(let j=0;j<lines.length;j++){ ctx.fillText(lines[j], 0, startY + j*lh); }
          ctx.restore();
        }

        ctx.restore();
      }

      function chooseIndexByProbability(segs){
        const raw = segs.map(s=>Number(s.probability)||0);
        const total = raw.reduce((a,b)=>a+b,0);
        const weights = total>0 ? raw.map(r=>r/total) : segs.map(()=>1/segs.length);
        let sum=0, cumul=[];
        for(const w of weights){ sum+=w; cumul.push(sum); }
        const r=Math.random();
        for(let i=0;i<cumul.length;i++){ if(r<=cumul[i]) return i; }
        return segs.length-1;
      }

      let segments = await loadSegments();
      drawWheel(segments);

      // --- Limit: 1 spin per user per day ---
      function _lsKey(){ return 'spin_last_date_' + (me?.user_id || 'guest'); }
      function checkLocalStorage(){ const today = new Date().toISOString().slice(0,10); return localStorage.getItem(_lsKey()) === today; }
      function markLocalStorage(){ const today = new Date().toISOString().slice(0,10); localStorage.setItem(_lsKey(), today); }

      async function alreadySpunToday(){
        // Prefer server-side check: look for user_vouchers created today (created by create_voucher_for_user RPC)
        try{
          if(typeof sb !== 'undefined' && sb && me && me.user_id){
            const start = new Date(); start.setHours(0,0,0,0);
            const r = await sb.from('user_vouchers').select('user_voucher_id, created_at').eq('user_id', me.user_id).gte('created_at', start.toISOString()).limit(1).maybeSingle();
            if(r && r.error){
              // table may not exist or other error -> fallback to localStorage
              return checkLocalStorage();
            }
            return !!(r.data);
          }
        }catch(e){
          return checkLocalStorage();
        }
        return checkLocalStorage();
      }

      // initial disable if already spun
      if(await alreadySpunToday()){
        btn.disabled = true;
        resultArea.innerHTML = `<div class="alert alert-info">Bạn đã quay hôm nay. Hẹn gặp lại ngày mai!</div>`;
      }

      // keep wheel sized on resize (use debounce)
      let resizeTimer;
      window.addEventListener('resize', ()=>{
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(()=> drawWheel(segments), 120);
      });

      let currentRotation = 0;

      function animateSpin(targetDeg, duration=3800){
        wrap.classList.add("spinning_glow");

        return new Promise(resolve=>{
          const start = performance.now();
          function frame(t){
            const progress = Math.min((t-start)/duration,1);
            const ease = 1 - Math.pow(1-progress,3);
            const ang = currentRotation + (targetDeg - currentRotation)*ease;
            wrap.style.transform = `rotate(${ang}deg)`;

            if(progress<1) requestAnimationFrame(frame);
            else {
              currentRotation = targetDeg % 360;
              wrap.classList.remove("spinning_glow");
              wrap.classList.add("shake");
              setTimeout(()=>wrap.classList.remove("shake"),300);
              resolve();
            }
          }
          requestAnimationFrame(frame);
        });
      }

      btn.addEventListener("click", async()=>{
        if(!segments.length) return;
        btn.disabled = true;
        resultArea.innerHTML = "";

        const idx = chooseIndexByProbability(segments);
        const n = segments.length;
        const anglePer = (2*Math.PI)/n;

        const midRad = idx * anglePer + anglePer/2;

        // compute pointer angle relative to canvas center
        const ptrEl = document.getElementById('pointer');
        const canvasRect = canvas.getBoundingClientRect();
        const px = ptrEl.getBoundingClientRect().left + ptrEl.getBoundingClientRect().width/2;
        const py = ptrEl.getBoundingClientRect().top + ptrEl.getBoundingClientRect().height/2;
        const cxRect = canvasRect.left + canvasRect.width/2;
        const cyRect = canvasRect.top + canvasRect.height/2;
        let pointerRad = Math.atan2(py - cyRect, px - cxRect);

        // normalize pointerRad into [0, 2PI)
        if(pointerRad < 0) pointerRad += 2*Math.PI;

        const spins = 5 + Math.random()*3;

        // target rotation (radians) so that midRad aligns to pointerRad
        const targetRad = spins * 2 * Math.PI + (pointerRad - midRad);
        const targetDeg = targetRad * 180 / Math.PI;

        await animateSpin(targetDeg);

        // fine-adjust: verify alignment and apply a small correction if needed
        // currentRotation is in degrees (0..360)
        const finalRotationRad = (currentRotation * Math.PI / 180) % (2*Math.PI);
        // actual mid position of the chosen slice after rotation
        let actualMid = midRad + finalRotationRad;
        actualMid = (actualMid % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
        // compute delta to pointer
        let delta = pointerRad - actualMid;
        // normalize delta into (-PI, PI]
        if(delta > Math.PI) delta -= 2*Math.PI;
        if(delta <= -Math.PI) delta += 2*Math.PI;
        const deltaDeg = delta * 180 / Math.PI;
        if(Math.abs(deltaDeg) > 0.2){
          // small corrective spin to snap exactly
          const correctionTarget = currentRotation + deltaDeg;
          await animateSpin(correctionTarget, 300);
        }

        // highlight the winning slice briefly
        drawWheel(segments, idx);
        setTimeout(()=> drawWheel(segments), 800);

        const picked = segments[idx];

        if(picked.discount_percent <= 0){
          resultArea.innerHTML = `<div class="alert alert-secondary">Chưa trúng thưởng, thử lại nhé!</div>`;
        } else {
          const rpc = await sb.rpc("create_voucher_for_user", {
            p_user_id: me.user_id,
            p_segment_id: picked.segment_id
          });
          if(rpc.error){
            resultArea.innerHTML = `<div class="alert alert-danger">Lỗi: ${rpc.error.message}</div>`;
          } else {
            const data = rpc.data;
            resultArea.innerHTML = `<div class="alert alert-success fw-bold">🎉 Trúng ${picked.label}!<br>Mã: <strong>${data.voucher_code}</strong></div>`;
          }
        }

        // mark that the user has used today's spin (server-side record may exist via RPC; also set local fallback)
        try{ markLocalStorage(); }catch(e){}
        btn.disabled = true;
      });

    })();
  </script>

</body>
